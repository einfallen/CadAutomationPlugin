# CI/CD 工作流配置
# 在 GitHub Actions 中自动编译 CAD 插件

name: Build CAD Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

# 权限配置
permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: '6.0.x'
  BUILD_CONFIGURATION: 'Release'
  CLOUD_BUILD: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    # 使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 准备云编译环境
      shell: pwsh
      run: |
        Write-Host "=== 准备云编译环境 ==="
        echo "CLOUD_BUILD=true" >> $env:GITHUB_ENV
        [Environment]::SetEnvironmentVariable("CLOUD_BUILD", "true", "Process")
        
        if (Test-Path "prepare-cloud-build.ps1") {
          .\prepare-cloud-build.ps1 -SkipAutoCADRefs
        }
        
        Write-Host "CLOUD_BUILD = $env:CLOUD_BUILD"
        Write-Host "GITHUB_ACTIONS = $env:GITHUB_ACTIONS"
        
    - name: 显示构建信息
      run: |
        echo "=== 构建环境 ==="
        dotnet --version
        echo "配置：${{ env.BUILD_CONFIGURATION }}"
        echo "云编译：$env:CLOUD_BUILD"
        
    - name: 还原依赖
      run: dotnet restore --verbosity normal
      
    - name: 编译
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity normal
      
    - name: 代码质量检查
      run: |
        echo "=== 运行代码分析器 ==="
        dotnet build /p:RunAnalyzersDuringBuild=true --verbosity normal
      continue-on-error: true
      
    - name: 运行测试
      run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal
      continue-on-error: true
      
    - name: 发布
      run: dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ./publish
      
    - name: 查看发布内容
      shell: pwsh
      run: |
        Write-Host "=== 发布内容 ==="
        Get-ChildItem -Path ./publish -Recurse -File | Select-Object FullName, Length | Format-Table
      
    - name: 上传构建产物 (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: CadAutomationPlugin-DLLs
        path: ./publish/
        retention-days: 30
        
    - name: 创建安装包
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath CadAutomationPlugin.zip
        Write-Host "创建安装包完成：CadAutomationPlugin.zip"
        
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: CadAutomationPlugin-Installer
        path: CadAutomationPlugin.zip
        retention-days: 30

  # 代码质量检查（可选，仅 PR 触发）
  code-analysis:
    runs-on: windows-latest
    needs: build-windows
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      security-events: write
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 还原依赖
      run: dotnet restore
      
    - name: 代码分析
      run: dotnet build /p:RunAnalyzersDuringBuild=true /warnaserror
      continue-on-error: true
