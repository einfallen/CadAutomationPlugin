# CI/CD 工作流配置
# 在 GitHub Actions 中自动编译 CAD 插件

name: Build CAD Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '6.0.x'
  BUILD_CONFIGURATION: 'Release'
  CLOUD_BUILD: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 设置 Node.js 24 环境变量
      run: |
        echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV
        echo "ACTIONS_STEP_DEBUG=true" >> $env:GITHUB_ENV
      shell: pwsh
      
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 .NET 6.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 准备云编译环境
      shell: pwsh
      run: |
        Write-Host "=== 准备云编译环境 ==="
        echo "CLOUD_BUILD=true" >> $env:GITHUB_ENV
        
        if (Test-Path "prepare-cloud-build.ps1") {
          .\prepare-cloud-build.ps1 -SkipAutoCADRefs
        }
        
        Write-Host "CLOUD_BUILD = $env:CLOUD_BUILD"
        
    - name: 显示构建信息
      run: |
        echo "=== 构建环境 ==="
        dotnet --version
        echo "配置：${{ env.BUILD_CONFIGURATION }}"
        echo "云编译：$env:CLOUD_BUILD"
        
    - name: 还原依赖
      run: dotnet restore --verbosity normal
      
    - name: 编译
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity diagnostic
      continue-on-error: false
      
    - name: 运行测试
      run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal
      continue-on-error: true
      
    - name: 发布
      run: dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ./publish
      
    - name: 查看发布内容
      shell: pwsh
      run: |
        Write-Host "=== 发布内容 ==="
        Get-ChildItem -Path ./publish -Recurse -File | Select-Object FullName, Length | Format-Table
      
    - name: 上传构建产物 (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: CadAutomationPlugin-DLLs
        path: ./publish/
        retention-days: 30
        
    - name: 创建安装包
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath CadAutomationPlugin.zip
        Write-Host "创建安装包完成：CadAutomationPlugin.zip"
        
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: CadAutomationPlugin-Installer
        path: CadAutomationPlugin.zip
        retention-days: 30
